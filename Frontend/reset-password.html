<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GroundClean</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color) 0%, #0d3d1e 100%);
            padding: 1rem;
        }
        .auth-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { color: var(--primary-color); margin: 0; font-size: 1.875rem; }
        .auth-header p { color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.95rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.95rem; }
        .auth-footer a { color: var(--primary-color); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .theme-toggle-auth { position: fixed; top: 1.5rem; right: 1.5rem; background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s ease; }
        .theme-toggle-auth:hover { background: rgba(255, 255, 255, 0.3); }
        .success-state { display: none; text-align: center; padding: 2rem 0; }
        .success-icon { font-size: 4rem; color: var(--success-color); margin-bottom: 1rem; }
    </style>
</head>
<body>
    <button class="theme-toggle-auth" onclick="toggleTheme()" title="Toggle dark mode">
        <span id="theme-icon">🌙</span>
    </button>

    <div class="auth-container">
        <div class="auth-header">
            <h1>🌱 GroundClean</h1>
            <p>Set New Password</p>
        </div>

        <div id="loading" style="display: none; text-align: center; margin-bottom: 1.5rem;">
            <div class="spinner" style="margin: 0 auto; margin-bottom: 0.75rem;"></div>
            <p style="color: var(--text-secondary);">Verifying link and saving password...</p>
        </div>

        <div id="formContainer">
            <p style="font-size: 0.9rem; color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem;">
                Please enter a strong password (at least 8 chars, one uppercase, one lowercase, one number, and one special character).
            </p>
            <form onsubmit="event.preventDefault(); resetPassword();">
                <div class="form-group">
                    <label class="form-label">New Password *</label>
                    <input type="password" id="password" placeholder="••••••••" required tabindex="1">
                </div>
                <div class="form-group mb-4">
                    <label class="form-label">Confirm New Password *</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required tabindex="2">
                </div>
                <button type="submit" id="resetBtn" class="btn btn-primary btn-block" tabindex="3">Update Password</button>
            </form>
        </div>
        
        <div class="auth-footer">
            <p><a href="index.html">Back to Sign In</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            
            // Validate token exists
            const params = new URLSearchParams(window.location.search)
            if (!params.get("token")) {
                document.getElementById("formContainer").innerHTML = `
                    <div style="text-align: center; color: var(--error-color); padding: 2rem 0;">
                        <span style="font-size: 3rem;">✕</span>
                        <h3 style="margin-top: 1rem;">Invalid Link</h3>
                        <p style="color: var(--text-secondary);">This password reset link is invalid or missing the security token. Please request a new one from the sign in page.</p>
                    </div>
                `
            }
        });
    </script>
</body>
</html>
