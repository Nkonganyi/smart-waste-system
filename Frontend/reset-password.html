<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — GroundClean</title>
    <meta name="description" content="Set a new password for your GroundClean account.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            background: radial-gradient(ellipse at 60% 0%, rgba(22,163,74,.18) 0%, transparent 55%),
                        radial-gradient(ellipse at 10% 100%, rgba(245,158,11,.12) 0%, transparent 50%),
                        var(--bg);
        }
        .auth-page-wrapper { width: 100%; max-width: 440px; }
        .auth-container {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 2.75rem;
            animation: slideUp .35s cubic-bezier(.34,1.56,.64,1);
            border-top: 4px solid var(--primary);
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute; top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, var(--primary-bg) 0%, transparent 70%);
            pointer-events: none;
        }
        .auth-header { text-align: center; margin-bottom: 2rem; position: relative; }
        .auth-logo {
            display: inline-flex; align-items: center; gap: .625rem;
            font-family: 'Outfit', sans-serif; font-size: 1.75rem;
            font-weight: 800; color: var(--primary);
            margin-bottom: .625rem; text-decoration: none;
        }
        .auth-logo:hover { text-decoration: none; color: var(--primary-light); }
        .auth-logo-icon {
            width: 42px; height: 42px;
            background: var(--primary-bg); border: 2px solid var(--primary-border);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.375rem;
        }
        .auth-header h2 { font-size: 1.375rem; color: var(--text-h); margin: 0 0 .375rem; }
        .auth-header p  { color: var(--text-muted); font-size: .875rem; margin: 0; }
        .auth-footer {
            text-align: center; margin-top: 1.75rem;
            font-size: .875rem; color: var(--text-muted);
        }
        .auth-footer a { color: var(--primary); font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .theme-toggle-auth {
            position: fixed; top: 1.25rem; right: 1.25rem;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-body); padding: .5rem 1rem;
            border-radius: var(--radius-sm); cursor: pointer;
            font-size: .9rem; transition: all var(--t); box-shadow: var(--shadow-sm);
        }
        .theme-toggle-auth:hover { background: var(--bg-alt); }
        .password-hint { font-size: .78rem; color: var(--text-subtle); margin-top: .375rem; line-height: 1.5; }
        .success-state { display: none; text-align: center; padding: 1.5rem 0; }
        .success-icon  { font-size: 4rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <button class="theme-toggle-auth" onclick="toggleTheme()" title="Toggle dark mode">
        <span id="theme-icon">🌙</span>
    </button>

    <div class="auth-page-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <a href="Home.html" class="auth-logo">
                    <div class="auth-logo-icon">🔒</div>
                    GroundClean
                </a>
                <h2>Set New Password</h2>
                <p>Create a strong password for your account</p>
            </div>

            <div id="loading" style="display: none; text-align: center; margin-bottom: 1.5rem;">
                <div class="spinner" style="margin: 0 auto 0.75rem;"></div>
                <p style="color: var(--text-muted); font-size: .875rem;">Verifying link and saving password...</p>
            </div>

            <div id="formContainer">
                <p class="password-hint" style="text-align: center; margin-bottom: 1.5rem;">
                    At least 8 characters with uppercase, lowercase, number &amp; special character.
                </p>
                <form onsubmit="event.preventDefault(); resetPassword();">
                    <div class="form-group">
                        <label class="form-label" for="password">New Password *</label>
                        <input type="password" id="password" placeholder="••••••••" required tabindex="1">
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label class="form-label" for="confirmPassword">Confirm New Password *</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required tabindex="2">
                    </div>
                    <button type="submit" id="resetBtn" class="btn btn-primary btn-block btn-lg" tabindex="3">
                        🔒 Update Password
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                <p><a href="index.html">← Back to Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            const params = new URLSearchParams(window.location.search);
            if (!params.get('token')) {
                document.getElementById('formContainer').innerHTML = `
                    <div style="text-align:center; padding:2rem 0;">
                        <span style="font-size:3rem;">❌</span>
                        <h3 style="margin-top:1rem; color:var(--text-h);">Invalid Link</h3>
                        <p style="color:var(--text-muted); font-size:.875rem; max-width:280px; margin:.75rem auto 0;">
                            This password reset link is invalid or missing the security token.
                            Please request a new one from the sign in page.
                        </p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
