<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collector Dashboard — GroundClean</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        #collectorMap {
            height: 420px;
            width: 100%;
            border-radius: var(--radius-lg);
            z-index: 1;
        }
        .route-marker {
            background-color: var(--primary);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
            font-size: .8rem;
        }
        #routeHint {
            margin-top: .75rem;
            color: var(--text-muted);
            font-size: .875rem;
        }
        .map-card .card-body { padding: 0; overflow: hidden; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">GroundClean</div>
            <div class="navbar-menu">
                <span class="navbar-item">👷 Collector Dashboard</span>
            </div>
            <button class="hamburger-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
            <div class="navbar-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
                    <span id="theme-icon">🌙</span>
                </button>
                <a class="navbar-logout" href="Home.html" style="text-decoration:none;">Home</a>
                <button class="navbar-logout" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>🌿 GroundClean</h3>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item"><a href="#" class="sidebar-link active">📈 Dashboard</a></li>
                <li class="sidebar-menu-item"><a href="#reports" class="sidebar-link">📋 My Assignments</a></li>
                <li class="sidebar-menu-item"><a href="#notifications" class="sidebar-link">🔔 Notifications</a></li>
                <li class="sidebar-menu-item"><a href="profile.html" class="sidebar-link">👤 My Profile</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <div id="loading" class="spinner"></div>

                <!-- Work Summary Section -->
                <section class="dashboard-section">
                    <div class="section-header">
                        <h2 class="section-title">📊 Work Summary</h2>
                    </div>
                    <div id="workSummary"></div>
                </section>

                <!-- Filter Section -->
                <section class="dashboard-section">
                    <div class="card" style="margin-bottom: 0;">
                        <div class="card-body" style="padding: 1rem 1.5rem;">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="showCompleted" onchange="loadAssignedReports()">
                                <span style="font-weight:600; color:var(--text-body);">Show Completed Jobs</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- Map Section -->
                <section class="dashboard-section">
                    <div class="section-header">
                        <h2 class="section-title">🗺️ Optimized Route</h2>
                    </div>
                    <div class="card map-card">
                        <div class="card-body">
                            <div id="collectorMap"></div>
                        </div>
                    </div>
                    <div id="routeHint"></div>
                </section>

                <!-- Assigned Reports Section -->
                <section class="dashboard-section" id="reports">
                    <div class="section-header">
                        <h2 class="section-title">📦 Assigned Reports</h2>
                    </div>
                    <div id="reportsList" class="card-grid"></div>
                </section>

                <!-- Notifications Section -->
                <section class="dashboard-section" id="notifications">
                    <div class="section-header">
                        <h2 class="section-title">🔔 My Notifications</h2>
                    </div>
                    <ul id="notificationsList" style="list-style: none; padding: 0;"></ul>
                </section>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/api.js"></script>
    <script src="js/collector.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('active');
            toggle.classList.toggle('active');
        }
        document.querySelectorAll('.sidebar-link').forEach(link => {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    document.querySelector('.sidebar').classList.remove('active');
                    document.getElementById('sidebarToggle').classList.remove('active');
                }
            });
        });
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
