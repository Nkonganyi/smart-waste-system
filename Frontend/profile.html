<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — GroundClean</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-avatar-wrap {
            position: relative;
            display: inline-block;
        }
        #avatarCircle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 4px 16px rgba(22,163,74,.3);
            border: 4px solid var(--bg-card);
            outline: 3px solid var(--primary-border);
        }
        .profile-info { flex: 1; }
        .profile-card-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-bg), var(--bg-alt));
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        #userNameHeading { font-size: 1.5rem; margin: 0 0 .375rem; }
        #userRoleBadge { margin: 0; }

        .read-only-field {
            background: var(--bg-alt) !important;
            cursor: not-allowed !important;
            color: var(--text-muted) !important;
        }
        .status-verified   { color: var(--primary); }
        .status-unverified { color: var(--amber); }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">GroundClean</div>
            <div class="navbar-menu">
                <span class="navbar-item">👤 My Profile</span>
            </div>
            <button class="hamburger-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
            <div class="navbar-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
                    <span id="theme-icon">🌙</span>
                </button>
                <a class="navbar-logout" href="Home.html" style="text-decoration:none;">Home</a>
                <button class="navbar-logout" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>🌿 GroundClean</h3>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item"><a href="#" id="sidebarDashLink" class="sidebar-link">📈 Dashboard</a></li>
                <li class="sidebar-menu-item"><a href="profile.html" class="sidebar-link active">👤 My Profile</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <div id="loading" class="spinner" style="display: none;"></div>

                <div class="section-header">
                    <h2 class="section-title">👤 User Profile</h2>
                </div>

                <div class="card" style="max-width: 820px; margin: 0 auto;">
                    <!-- Profile Header -->
                    <div class="profile-card-header">
                        <div class="profile-avatar-wrap">
                            <div id="avatarCircle">U</div>
                        </div>
                        <div class="profile-info">
                            <h3 id="userNameHeading">User Name</h3>
                            <p id="userRoleBadge" class="badge badge-role">Role</p>
                        </div>
                    </div>

                    <!-- Profile Form -->
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" id="name" name="name" required minlength="2" placeholder="Your full name">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email <span style="color:var(--text-subtle); font-weight:400; font-size:.8rem;">(read-only)</span></label>
                                    <input type="email" id="email" class="read-only-field" readonly placeholder="your@email.com">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Phone Number</label>
                                    <input type="text" id="phone" name="phone" placeholder="+237 6XX XXX XXX">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Address</label>
                                    <input type="text" id="address" name="address" placeholder="Your street address">
                                </div>
                            </div>

                            <div class="form-group" style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border);">
                                <label class="form-label">Account Status</label>
                                <p id="statusText" style="font-weight:600; margin:0;">Verifying...</p>
                            </div>

                            <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                                <button type="button" class="btn btn-secondary" onclick="goBack()">Cancel</button>
                                <button type="submit" class="btn btn-primary" id="saveBtn">💾 Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }
        function goBack() {
            const role = localStorage.getItem('role');
            if (role === 'admin') window.location.href = 'admin.html';
            else if (role === 'collector') window.location.href = 'collector.html';
            else window.location.href = 'citizen.html';
        }
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            const role = localStorage.getItem('role');
            const dashLink = document.getElementById('sidebarDashLink');
            if (role === 'admin') dashLink.href = 'admin.html';
            else if (role === 'collector') dashLink.href = 'collector.html';
            else dashLink.href = 'citizen.html';
        });
    </script>
</body>
</html>
