<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GroundClean</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color) 0%, #0d3d1e 100%);
            padding: 1rem;
        }
        .auth-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.875rem;
        }
        .auth-header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .auth-footer a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .theme-toggle-auth {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }
        .theme-toggle-auth:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="theme-toggle-auth" onclick="toggleTheme()" title="Toggle dark mode">
        <span id="theme-icon">🌙</span>
    </button>

    <div class="auth-container">
        <div class="auth-header">
            <h1>🌱 GroundClean</h1>
            <p>Create Your Account</p>
        </div>

        <div id="authLoading" style="display: none; text-align: center; margin-bottom: 1.5rem;">
            <div class="spinner" style="margin: 0 auto; margin-bottom: 0.75rem;"></div>
            <p style="color: var(--text-secondary);">Creating your account...</p>
        </div>

        <form onsubmit="event.preventDefault(); register();">
            <div class="form-group">
                <label class="form-label">Full Name *</label>
                <input type="text" id="name" placeholder="John Doe" required tabindex="1">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address *</label>
                <input type="email" id="email" placeholder="your@email.com" required tabindex="2">
            </div>
            <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" id="password" placeholder="••••••••" required tabindex="3">
                <small style="color: var(--text-tertiary);">Minimum 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char</small>
            </div>
            <div class="form-group">
                <label class="form-label">Account Type *</label>
                <select id="role" required tabindex="4">
                    <option value="">Select your role...</option>
                    <option value="citizen">👤 Citizen - Report waste issues</option>
                    <option value="collector">👷 Waste Collector - Collect and manage reports</option>
                </select>
            </div>
            <button type="submit" id="registerBtn" class="btn btn-primary btn-block" tabindex="5">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="index.html">Sign In</a></p>
            <p><a href="Home.html">Back to Home</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Dark mode toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const icon = document.getElementById('theme-icon');
            icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Load saved theme on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('theme-icon');
            icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
